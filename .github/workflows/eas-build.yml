# .github/workflows/eas-build.yml
#
# EAS Build pipeline — produces iOS + Android binaries.
#
# Triggers:
#   - push to main         → "preview" profile  (TestFlight / Play Internal)
#   - push of tag v*       → "production" profile (App Store / Play release)
#   - workflow_dispatch    → choose profile manually
#
# Required secrets (Settings → Secrets and variables → Actions):
#   EXPO_TOKEN  — Expo personal access token from
#                 https://expo.dev/settings/access-tokens
#
# EAS already manages Apple/Google credentials via `eas credentials` —
# nothing extra in GitHub Actions secrets.

name: EAS Build

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        type: choice
        options: [development, preview, production]
        default: preview
      platform:
        description: 'Platform'
        required: true
        type: choice
        options: [all, ios, android]
        default: all

permissions:
  contents: read

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.profile || 'auto' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with: { version: 9 }

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> $GITHUB_OUTPUT
            echo "platform=${{ inputs.platform }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "platform=all" >> $GITHUB_OUTPUT
          else
            echo "profile=preview" >> $GITHUB_OUTPUT
            echo "platform=all" >> $GITHUB_OUTPUT
          fi

      - name: EAS Build
        run: |
          eas build \
            --profile ${{ steps.profile.outputs.profile }} \
            --platform ${{ steps.profile.outputs.platform }} \
            --non-interactive \
            --no-wait
        # `--no-wait` returns immediately. Builds are visible at
        # https://expo.dev/accounts/petaluma/projects/bsure-mobile/builds
